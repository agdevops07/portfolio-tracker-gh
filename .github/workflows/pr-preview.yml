name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Inject API Key for preview
        run: |
          sed -i "s/YOUR_GROQ_API_KEY_HERE/${{ secrets.GROQ_API_KEY }}/g" js/screener-main.js

      # ── Deploy to GitHub Pages under a pr-{number} sub-path ──────────────────
      # We use a dedicated gh-pages branch and push only the PR's folder there.
      - name: Deploy PR preview to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        id: deploy
        with:
          branch: gh-pages-previews
          folder: .
          target-folder: pr-${{ github.event.pull_request.number }}
          clean: false   # don't wipe other PR previews

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const repo     = context.repo;
            const pr       = context.payload.pull_request.number;
            const owner    = repo.owner;
            const repoName = repo.repo;
            const previewUrl = `https://${owner}.github.io/${repoName}/pr-${pr}/`;

            // Delete any previous bot comment so we don't stack up duplicates
            const comments = await github.rest.issues.listComments({
              owner, repo: repoName, issue_number: pr,
            });
            for (const c of comments.data) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes('📐 PR Preview')) {
                await github.rest.issues.deleteComment({ owner, repo: repoName, comment_id: c.id });
              }
            }

            // Post fresh comment
            await github.rest.issues.createComment({
              owner, repo: repoName, issue_number: pr,
              body: [
                '## 📐 PR Preview',
                '',
                `**Preview URL:** ${previewUrl}`,
                '',
                '| | |',
                '|---|---|',
                `| Branch | \`${{ github.head_ref }}\` |`,
                `| Commit | \`${{ github.event.pull_request.head.sha.substring(0, 7) }}\` |`,
                `| Updated | ${new Date().toUTCString()} |`,
                '',
                '_Preview is live within ~60 seconds of this comment appearing._',
              ].join('\n'),
            });

  # ── Tear down preview when PR is closed / merged ─────────────────────────
  teardown-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages-previews branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages-previews
          fetch-depth: 0

      - name: Remove PR folder and push
        run: |
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "chore: remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          fi

      - name: Comment teardown on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: pr,
            });
            for (const c of comments.data) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes('📐 PR Preview')) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
            }
            await github.rest.issues.createComment({
              owner, repo, issue_number: pr,
              body: '🧹 PR Preview has been removed (PR closed).',
            });
