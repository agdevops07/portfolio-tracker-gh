name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write        # needed to push to gh-pages branch
  pull-requests: write   # needed to comment on PRs

jobs:
  # ── Deploy preview when PR is opened / updated ────────────────────────────
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Inject API Key for preview
        run: |
          sed -i "s/YOUR_GROQ_API_KEY_HERE/${{ secrets.GROQ_API_KEY }}/g" js/screener-main.js

      # Push into a pr-{number} subfolder on the SAME gh-pages branch
      # that GitHub Pages already serves (so the URL works immediately)
      - name: Deploy PR preview into gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages          # same branch GitHub Pages serves
          folder: .                 # contents of the repo
          target-folder: pr-${{ github.event.pull_request.number }}
          clean: false              # don't wipe other previews or the main site

      - name: Post preview URL as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const owner    = context.repo.owner;
            const repoName = context.repo.repo;
            const pr       = context.payload.pull_request.number;
            const branch   = context.payload.pull_request.head.ref;
            const sha      = context.payload.pull_request.head.sha.slice(0, 7);
            const url      = `https://${owner}.github.io/${repoName}/pr-${pr}/`;

            // Remove any previous preview comment to avoid duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo: repoName, issue_number: pr,
            });
            for (const c of comments) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes('📐 PR Preview')) {
                await github.rest.issues.deleteComment({ owner, repo: repoName, comment_id: c.id });
              }
            }

            await github.rest.issues.createComment({
              owner, repo: repoName, issue_number: pr,
              body: [
                '## 📐 PR Preview',
                '',
                `🔗 **[Open Preview](${url})**`,
                '',
                `| | |`,
                `|---|---|`,
                `| Branch | \`${branch}\` |`,
                `| Commit | \`${sha}\` |`,
                `| Updated | ${new Date().toUTCString()} |`,
                '',
                '_Allow ~60 s for the deployment to propagate._',
              ].join('\n'),
            });

  # ── Remove preview folder when PR is closed / merged ─────────────────────
  teardown-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Delete pr-{number} folder and push
        run: |
          PR_DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "chore: remove preview for PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "No preview folder found for $PR_DIR — nothing to clean up."
          fi

      - name: Post teardown comment
        uses: actions/github-script@v7
        with:
          script: |
            const owner    = context.repo.owner;
            const repoName = context.repo.repo;
            const pr       = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo: repoName, issue_number: pr,
            });
            for (const c of comments) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes('📐 PR Preview')) {
                await github.rest.issues.deleteComment({ owner, repo: repoName, comment_id: c.id });
              }
            }
            await github.rest.issues.createComment({
              owner, repo: repoName, issue_number: pr,
              body: '🧹 PR preview removed (PR closed).',
            });